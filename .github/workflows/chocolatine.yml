name: Chocolatine

on:
  push:
  pull_request:

env:
  EXECUTABLES: robot-factory

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: >-
      !startsWith(github.ref, 'refs/heads/no-ga/') &&
      !startsWith(github.head_ref, 'no-ga/') &&
      github.event.repository.ssh_url != 'git@github.com:EpitechPGE1-2025/G-DOP-200-RUN-2-1-chocolatine-5.git'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run banana-check-repo
        run: banana-check-repo

      - name: Compile project
        run: make
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: Display coding style errors as annotations
        if: always()
        run: |
          if [ -f coding-style.log ]; then
            while read -r line; do
              file=$(echo "$line" | cut -d: -f1)
              lineno=$(echo "$line" | cut -d: -f2)
              msg=$(echo "$line" | cut -d: -f3- | xargs)
              echo "::error file=${file},line=${lineno}::${msg}"
            done < coding-style-reports.log
          fi

      - name: Fail if coding style errors
        if: always()
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: Clean project
        run: make clean

      - name: Verify executables
        run: |
          status=0
          IFS=',' read -ra EXEC_LIST <<< "$EXECUTABLES"
          for exec in "${EXEC_LIST[@]}"; do
            exec=$(echo "$exec" | xargs)
            if [ ! -f "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' not found"
              status=1
            elif [ ! -x "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' is not executable"
              status=1
            fi
          done
          exit $status

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: >-
      !startsWith(github.ref, 'refs/heads/no-ga/') &&
      !startsWith(github.head_ref, 'no-ga/') &&
      github.event.repository.ssh_url != 'git@github.com:EpitechPGE1-2025/G-DOP-200-RUN-2-1-chocolatine-5.git'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/heads/no-ga/') &&
      github.event.repository.ssh_url != 'git@github.com:EpitechPGE1-2025/G-DOP-200-RUN-2-1-chocolatine-5.git'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: 'git@github.com:EpitechPGE1-2025/G-DOP-200-RUN-2-1-chocolatine-5.git'
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}