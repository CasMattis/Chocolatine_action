name: Chocolatine

on:
  push:
  pull_request:

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-PRO-200-RUN-2-1-memo-2.git"
  EXECUTABLES: "mysh"

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: >-
      !startsWith(github.ref, 'refs/heads/no-ga/') &&
      !startsWith(github.head_ref, 'no-ga/') &&
      github.event.repository.ssh_url != env.MIRROR_SSH_URL
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run banana-check-repo
        run: banana-check-repo

      - name: Compile project
        run: make 2>&1 | tee build.log
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: Display coding style errors as annotations
        run: |
          if [ -f build.log ]; then
            grep "\[Banana\]" build.log > coding-style-reports.log || true
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1)
              lineno=$(echo "$line" | cut -d':' -f2)
              col=$(echo "$line" | cut -d':' -f3)
              msg=$(echo "$line" | cut -d':' -f4- | sed 's/^[ \t]*//')
              echo "::error file=${file},line=${lineno},col=${col}::${msg}"
            done < coding-style-reports.log
          fi

      - name: Fail if coding style errors
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: Clean project
        run: make clean

      - name: Verify executables
        run: |
          status=0
          IFS=',' read -ra EXEC_LIST <<< "$EXECUTABLES"
          for exec in "${EXEC_LIST[@]}"; do
            exec=$(echo "$exec" | xargs)
            if [ ! -f "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' not found"
              status=1
            elif [ ! -x "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' is not executable"
              status=1
            fi
          done
          exit $status

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: >-
      !startsWith(github.ref, 'refs/heads/no-ga/') &&
      !startsWith(github.head_ref, 'no-ga/') &&
      github.event.repository.ssh_url != env.MIRROR_SSH_URL
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/heads/no-ga/') &&
      github.event.repository.ssh_url != env.MIRROR_SSH_URL
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
